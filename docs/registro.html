      <form action="registro.php" method="POST" class="space-y-6">
        <div class="space-y-2 relative">
          <label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant font-medium" for="nombre">Nombre</label>
          <div class="relative group">

          </div>
        </div>

        <div class="space-y-2 relative">
          <label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant font-medium" for="usuario">Usuario</label>
          <div class="relative group">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-xl">badge</span>
            <input class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface font-body text-base placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary/20 focus:outline-none transition-all" id="usuario" name="usuario" placeholder="tu_usuario" required type="text"/>

        </div>

            <input class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl text-on-surface font-body text-base placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary/20 focus:outline-none transition-all" id="correo" name="correo" placeholder="correo@ejemplo.com" required type="email"/>
