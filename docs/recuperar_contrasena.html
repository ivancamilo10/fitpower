  <script>
    const params = new URLSearchParams(window.location.search);
    const statusOk = document.getElementById('status-ok');
    const statusError = document.getElementById('status-error');

    if (statusOk) statusOk.style.display = 'none';
    if (statusError) statusError.style.display = 'none';

    if (params.get('ok') === '1' && statusOk) {
        statusOk.style.display = 'block';
    }
    if (params.get('error') === '1' && statusError) {
        statusError.style.display = 'block';
    }
</script>
